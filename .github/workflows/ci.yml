name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: uv sync --dev

    - name: Protocol of Silence (Ruff Check & Format)
      run: |
        uv run ruff check .
        uv run ruff format --check .

    - name: Mypy Strict Type Checking
      run: uv run mypy --strict src/pure_mls/

    - name: Compile Protobufs for gRPC E2E
      run: uv run python -m grpc_tools.protoc -I. --python_out=. --grpc_python_out=. tests/protos/mls.proto

    - name: Start Mosquitto (Test Broker)
      run: docker run -d -p 1883:1883 eclipse-mosquitto:1.6.15

    - name: Download IETF MLS Test Vectors
      run: |
        mkdir -p tests/ietf_vectors
        BASE="https://raw.githubusercontent.com/mlswg/mls-implementations/main/test-vectors"
        curl -sf "${BASE}/crypto-basics.json"          -o tests/ietf_vectors/crypto-basics.json
        curl -sf "${BASE}/key-schedule.json"           -o tests/ietf_vectors/key-schedule.json
        curl -sf "${BASE}/passive-client-welcome.json" -o tests/ietf_vectors/passive-client-welcome.json
        curl -sf "${BASE}/secret-tree.json"            -o tests/ietf_vectors/secret-tree.json

    - name: Run Pytest (Unit & E2E)
      run: uv run pytest tests/ -v

    - name: Run IETF Interop Vector Tests
      run: uv run pytest tests/test_ietf_vectors.py -v --tb=short
